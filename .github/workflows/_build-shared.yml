name: Build Shared (reusable)

on:
  workflow_call:
    secrets:
      APPLE_CERTIFICATE_BASE64:
        required: true
      APPLE_CERTIFICATE_PASSWORD:
        required: true
      KEYCHAIN_PASSWORD:
        required: true

jobs:
  build-shared:
    name: Build Shared
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - uses: ./.github/actions/import-apple-certificate
        with:
          certificate_base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          certificate_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain_password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build StytchSwiftUtils
        working-directory: source/StytchSwiftUtils
        run: |
          rm -rf derived archives StytchSwiftUtils.xcframework

          xcodebuild -project StytchSwiftUtils.xcodeproj -scheme StytchSwiftUtils \
            -configuration Release -destination 'generic/platform=iOS' \
            -derivedDataPath ./derived IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            SKIP_INSTALL=NO BUILD_LIBRARIES_FOR_DISTRIBUTION=YES ONLY_ACTIVE_ARCH=NO build

          xcodebuild -project StytchSwiftUtils.xcodeproj -scheme StytchSwiftUtils \
            -configuration Release -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./derived IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            SKIP_INSTALL=NO BUILD_LIBRARIES_FOR_DISTRIBUTION=YES ONLY_ACTIVE_ARCH=NO build

          xcodebuild -project StytchSwiftUtils.xcodeproj -scheme StytchSwiftUtils \
            -configuration Release -archivePath "./archives/iOS" \
            -destination 'generic/platform=iOS' -derivedDataPath ./derived \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 SKIP_INSTALL=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES ONLY_ACTIVE_ARCH=NO archive

          xcodebuild -project StytchSwiftUtils.xcodeproj -scheme StytchSwiftUtils \
            -configuration Release -archivePath "./archives/Simulator" \
            -destination 'generic/platform=iOS Simulator' -derivedDataPath ./derived \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 SKIP_INSTALL=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES ONLY_ACTIVE_ARCH=NO archive

          xcodebuild -create-xcframework \
            -framework archives/iOS.xcarchive/Products/Library/Frameworks/StytchSwiftUtils.framework \
            -framework archives/Simulator.xcarchive/Products/Library/Frameworks/StytchSwiftUtils.framework \
            -output StytchSwiftUtils.xcframework

          cp ./derived/Build/Intermediates.noindex/StytchSwiftUtils.build/Release-iphoneos/StytchSwiftUtils.build/DerivedSources/StytchSwiftUtils-Swift.h \
            ../shared/sdk/shared/src/iosMain/interop/StytchSwiftUtils-device.h
          cp ./derived/Build/Intermediates.noindex/StytchSwiftUtils.build/Release-iphonesimulator/StytchSwiftUtils.build/DerivedSources/StytchSwiftUtils-Swift.h \
            ../shared/sdk/shared/src/iosMain/interop/StytchSwiftUtils-simulator.h

          sed -i '' '/^\/\/ Generated by Apple Swift version/d' \
            ../shared/sdk/shared/src/iosMain/interop/StytchSwiftUtils-device.h \
            ../shared/sdk/shared/src/iosMain/interop/StytchSwiftUtils-simulator.h

          cp -r ./StytchSwiftUtils.xcframework ../shared/sdk/shared/src/iosMain/interop/

      - name: Verify SwiftUtils headers are unchanged
        run: |
          git diff --exit-code \
            source/shared/sdk/shared/src/iosMain/interop/StytchSwiftUtils-device.h \
            source/shared/sdk/shared/src/iosMain/interop/StytchSwiftUtils-simulator.h

      - name: Build StytchSharedSDK XCFramework
        working-directory: source/shared
        run: ./gradlew :sdk:shared:assembleStytchSharedSDKXCFramework

      - name: Upload SwiftUtils interop artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: swift-utils-interop
          path: source/shared/sdk/shared/src/iosMain/interop/

      - name: Upload StytchSharedSDK xcframework
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: shared-xcframework
          path: source/shared/sdk/shared/build/XCFrameworks/release/StytchSharedSDK.xcframework
