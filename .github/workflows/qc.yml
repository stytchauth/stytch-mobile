name: Quality Control

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-shared:
    name: Lint & Test (Shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Lint, Test & Coverage
        working-directory: source/shared
        run: ./gradlew ktlintCheck koverXmlReportJvm

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: source/shared/sdk/shared/build/reports/kover/reportJvm.xml

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: source/shared/sdk/shared/build/reports/kover/reportJvm.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage — Shared SDK
          update-comment: true

  check-consumer:
    name: Lint & Test (External SDK)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Publish shared to mavenLocal
        working-directory: source/shared
        run: ./gradlew publishToMavenLocal

      - name: Lint, Test & Coverage
        working-directory: source/sdks
        run: ./gradlew ktlintCheck checkLegacyAbi koverXmlReportJvm

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-consumer
          path: source/sdks/sdk/consumer-headless/build/reports/kover/reportJvm.xml

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: source/sdks/sdk/consumer-headless/build/reports/kover/reportJvm.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage — External SDK
          update-comment: true

  check-ios-simulator:
    name: Test (iOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Build StytchSwiftUtils for simulator
        working-directory: source/StytchSwiftUtils
        run: |
          xcodebuild \
            -project StytchSwiftUtils.xcodeproj \
            -scheme StytchSwiftUtils \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./derived \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            SKIP_INSTALL=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Run iOS simulator tests
        working-directory: source/shared
        run: ./gradlew :sdk:shared:iosSimulatorArm64Test

  check-android-instrumented:
    name: Test (Android Instrumented)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          working-directory: source/shared
          script: ./gradlew :sdk:shared:connectedAndroidTest

  check-swift-utils:
    name: Test (StytchSwiftUtils)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo $CERTIFICATE_BASE64 | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH

      - name: Test StytchSwiftUtils
        run: |
          xcodebuild test \
            -project source/StytchSwiftUtils/StytchSwiftUtils.xcodeproj \
            -scheme StytchSwiftUtils \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -allowProvisioningUpdates

  check-rn:
    name: Test (React Native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            source/react-native/consumer/yarn.lock
            source/react-native/b2b/yarn.lock

      - name: Install consumer deps
        working-directory: source/react-native/consumer
        run: yarn install --frozen-lockfile

      - name: Test consumer
        working-directory: source/react-native/consumer
        run: yarn test

      - name: Install b2b deps
        working-directory: source/react-native/b2b
        run: yarn install --frozen-lockfile

      - name: Test b2b
        working-directory: source/react-native/b2b
        run: yarn test
