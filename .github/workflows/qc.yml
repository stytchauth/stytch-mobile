name: Quality Control

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-shared:
    name: Lint & Test (stytch-multiplatform-shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Lint
        working-directory: stytch-multiplatform-shared
        run: ./gradlew ktlintCheck

      - name: Test & Coverage
        working-directory: stytch-multiplatform-shared
        run: ./gradlew koverXmlReportJvm

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: stytch-multiplatform-shared/sdk/shared/build/reports/kover/reportJvm.xml

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: stytch-multiplatform-shared/sdk/shared/build/reports/kover/reportJvm.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage — stytch-multiplatform-shared
          update-comment: true

  check-consumer:
    name: Lint & Test (stytch-multiplatform)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Publish shared to mavenLocal
        working-directory: stytch-multiplatform-shared
        run: ./gradlew publishToMavenLocal

      - name: Lint, Test & Coverage
        working-directory: stytch-multiplatform
        run: ./gradlew ktlintCheck koverXmlReportJvm --rerun-tasks

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-consumer
          path: stytch-multiplatform/sdk/consumer-headless/build/reports/kover/reportJvm.xml

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: stytch-multiplatform/sdk/consumer-headless/build/reports/kover/reportJvm.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage — stytch-multiplatform
          update-comment: true
