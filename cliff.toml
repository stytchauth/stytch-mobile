# git-cliff configuration
# See https://git-cliff.org/docs/configuration

[changelog]
header = """# Stytch Mobile SDK Changelog

All notable changes to this project will be documented in this file.

"""
body = """{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | upper_first }}

{% for commit in commits %}\
- {{ commit.message | upper_first }}\
{% if commit.remote.pr_number %} \
([#{{ commit.remote.pr_number }}]({{ commit.remote.pr_url }}))\
{% endif %} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/stytchauth/stytch-mobile/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}\
"""
trim = true
footer = ""

[git]
conventional_commits = true
# Include non-conventional commits — they land in "Changes" via the catch-all parser
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  # Skip commits that don't belong in user-facing changelogs
  { message = "^test", skip = true },
  { message = "^chore|^ci|^build", skip = true },
  { message = "^Merge (pull request|branch)", skip = true },
  # Catch-all: anything not matched above will be skipped for now. Forces us to use good naming practices
  { message = ".*", skip = true },
]
filter_commits = true
tag_pattern = "^[0-9]+\\.[0-9]+\\.[0-9]+$"
topo_order = false
sort_commits = "oldest"

# Enables PR number resolution in the body template above.
# git-cliff uses the GITHUB_TOKEN env var automatically when this is set.
[remote.github]
owner = "stytchauth"
repo = "stytch-mobile"
